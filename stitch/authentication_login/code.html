<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nexus | Authenticate</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "background": "#FAFAFA",
                    "surface": "#FFFFFF",
                    "outline-variant": "#DBDBDB",
                    "on-surface": "#262626",
                    "on-surface-variant": "#8E8E8E",
                    "primary": "#405DE6",
                    "secondary": "#E1306C"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "8px",
                    "xl": "12px",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter", "sans-serif"],
                    "body": ["Inter", "sans-serif"],
                    "label": ["Inter", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .cta-gradient {
            background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);
        }
        .cta-gradient:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface selection:bg-primary/20 min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-[935px] bg-surface border border-outline-variant rounded-lg overflow-hidden flex flex-col lg:flex-row shadow-sm">
<!-- Left Column: Visual/Branding -->
<div class="relative hidden lg:flex flex-1 flex-col justify-center p-12 bg-[#F8F9FA] overflow-hidden border-r border-outline-variant">
<!-- Simplified Minimal Visual -->
<div class="relative z-10 space-y-8">
<div class="flex items-center gap-2">
<span class="text-on-surface text-3xl font-extrabold tracking-tight">NEXUS</span>
</div>
<div class="space-y-4">
<h1 class="text-4xl font-bold tracking-tight text-on-surface leading-tight">
                        Curating the <br/>
<span class="text-transparent bg-clip-text cta-gradient">Digital Frontier.</span>
</h1>
<p class="text-on-surface-variant text-lg max-w-sm leading-relaxed">
                        The premiere destination for architectural insight and digital design excellence.
                    </p>
</div>
<!-- Simple Metric -->
<div class="flex items-center gap-4 pt-4">
<div class="flex -space-x-2">
<img alt="User" class="h-8 w-8 rounded-full border-2 border-surface object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD787boKSiWGQu4SV5FETPsuwtp8IpxzkPfyY3ToXQtyeL-x1EKVqSlS4BOwZiD77OoAsbI5_SPlN5gJ_UiYGkp3QbXZAy9VFLIS9VKO6h2_YpJ1u8-uUj9ZGoZZ4Md_FlCrXhOuICebJ4mCr1OBSY94tsZFmQv4Du6yQVRq_kBKiOo0Mc_Ifb6WrCgzC72D8CC-diVr4pWr48aLlNity9Dk8EyElJeyjLrn3mru5uDwICYjWUPxd9AFZ2CRNFEGss2k7G1PHKuf5Zs"/>
<img alt="User" class="h-8 w-8 rounded-full border-2 border-surface object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAMpSqRS3QBLyqFQMNlfkvGcO-AiUbTzljE5ZQRK5hZWeWkx-7UBEaRoi-bPXAN_ARLdbPRRDuPBWs2EpnBKwwNXavSpmhbKu2on3MZCZgMcYUjeHwqoT5KROxNlbE1YoZt1M219teb3lIpeivHUq9EVMeP-OrqD99wOmxUNF7gRO5i6qtdf-YXIW09bVXkQiKWZ76LsDsGcO_4NDXDWjdvPst_ITcNEBeuHKrQUVcVPSm8VHmMcTmmiPPY5esIcX5pHprcXH7g_VvS"/>
</div>
<span class="text-xs font-semibold text-on-surface-variant">Trusted by 12,000+ creators</span>
</div>
</div>
<!-- Decorative Subtle Graphic -->
<div class="absolute -bottom-20 -left-20 w-80 h-80 bg-gradient-to-tr from-primary/5 to-transparent rounded-full blur-3xl"></div>
</div>
<!-- Right Column: Login Form -->
<div class="flex-1 p-8 md:p-12 flex flex-col justify-center bg-surface">
<div class="max-w-[350px] mx-auto w-full">
<!-- Branding Header -->
<div class="text-center mb-10">
<span class="text-on-surface text-4xl font-extrabold tracking-tight lg:hidden block mb-8">NEXUS</span>
<h2 class="text-xl font-bold text-on-surface mb-2">Welcome Back</h2>
<p class="text-on-surface-variant text-sm">Enter your credentials to continue</p>
</div>
<!-- Form -->
<form class="space-y-4">
<div class="relative">
<input class="w-full bg-[#FAFAFA] border border-outline-variant rounded-sm py-2.5 px-3 text-sm text-on-surface placeholder:text-on-surface-variant/60 focus:outline-none focus:border-on-surface-variant/50 transition-all" id="email" placeholder="Email Address" type="email"/>
</div>
<div class="relative">
<input class="w-full bg-[#FAFAFA] border border-outline-variant rounded-sm py-2.5 px-3 text-sm text-on-surface placeholder:text-on-surface-variant/60 focus:outline-none focus:border-on-surface-variant/50 transition-all" id="password" placeholder="Password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-bold text-on-surface hover:text-on-surface-variant transition-colors" type="button">
                            Show
                        </button>
</div>
<button class="w-full cta-gradient text-white text-sm font-bold py-2.5 rounded-lg active:scale-[0.98] transition-all duration-200 mt-2" type="submit">
                        Log In
                    </button>
</form>
<div class="relative flex items-center my-8">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 text-xs font-bold text-on-surface-variant uppercase tracking-wider">Or</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Alternative Logins -->
<div class="space-y-4">
<button class="w-full flex items-center justify-center gap-2 text-sm font-bold text-[#385185] hover:opacity-80 transition-opacity">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"></path>
</svg>
                        Log in with Google
                    </button>
<div class="text-center">
<a class="text-xs text-[#00376B] hover:underline" href="#">Forgot password?</a>
</div>
</div>
<!-- Footer / Sign Up -->
<div class="mt-12 pt-8 border-t border-outline-variant text-center">
<p class="text-on-surface text-sm">
                        Don't have an account? 
                        <a class="text-primary font-bold ml-1 hover:underline underline-offset-4" href="#">Sign up</a>
</p>
</div>
</div>
</div>
</div>
</body></html>
